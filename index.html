<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="TGC-Arkade — arkanoid-style game (Phaser remake aligned with the classic HTML5 build)." />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#050810" />
    <title>TGC-Arkade — Simple arkanoid style game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        background: #050810;
        overflow: hidden;
        touch-action: none;
        font-family: 'VT323', system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      #game-root {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .tgc-hidden {
        display: none !important;
      }
    </style>
  </head>
  <body oncontextmenu="return false;">
    <div id="game-root"></div>

    <div
      id="tgc-welcome"
      class="tgc-welcome tgc-hidden"
      aria-hidden="true"
      data-welcome-bg="/assets/episodes/space/images/tgc-welcome-bg.png"
    >
      <div
        class="tgc-welcome__photo"
        style="background-image: url('/assets/episodes/space/images/tgc-welcome-bg.png')"
      ></div>
      <div class="tgc-welcome__backdrop"></div>
      <div class="tgc-welcome__vignette"></div>
      <div class="tgc-welcome__panel">
        <header class="tgc-welcome__hero">
          <div class="tgc-welcome__badge" id="tgc-welcome-badge"></div>
          <h1 class="tgc-welcome__title">
            <span class="tgc-welcome__title-main">TGC</span>
            <span class="tgc-welcome__title-sep">·</span>
            <span class="tgc-welcome__title-sub">ARKADE</span>
          </h1>
          <p class="tgc-welcome__tagline" id="tgc-welcome-tagline"></p>
          <p class="tgc-welcome__hook" id="tgc-welcome-hook"></p>
        </header>
        <div class="tgc-welcome__card">
          <div class="tgc-welcome__card-glow" aria-hidden="true"></div>
          <label class="tgc-welcome__label" for="tgc-welcome-name" id="tgc-welcome-label"></label>
          <input
            id="tgc-welcome-name"
            class="tgc-welcome__input"
            type="text"
            maxlength="24"
            autocomplete="username"
          />
          <button type="button" class="tgc-welcome__btn" id="tgc-welcome-go">
            <span class="tgc-welcome__btn-glow" aria-hidden="true"></span>
            <span class="tgc-welcome__btn-label" id="tgc-welcome-go-label"></span>
          </button>
          <p id="tgc-welcome-err"></p>
        </div>
      </div>
    </div>

    <div id="tgc-overlay" class="tgc-hidden lbx-profile" aria-hidden="true">
      <div class="tgc-backdrop" aria-hidden="true"></div>
      <div class="lbx-window tgc-profile-root" role="dialog" aria-labelledby="tgc-dialog-title">
        <button type="button" id="tgc-close" class="tgc-close" aria-label="Close">×</button>
        <div class="tgc-lbx-header" id="tgc-dialog-title"></div>
        <div class="tgc-profile-body">
          <nav class="tgc-profile-tabs">
            <a href="#" data-tab="profile" class="tab-selected"></a>
            <a href="#" data-tab="leaderboard"></a>
          </nav>
          <div id="tgc-tab-profile" class="tgc-tab-contents">
            <div class="tgc-profile-user">
              <div class="tgc-profile-avatar" aria-hidden="true">👤</div>
              <div>
                <div class="tgc-profile-name" id="tgc-profile-name">—</div>
                <p class="tgc-profile-cloud" id="tgc-profile-cloud"></p>
              </div>
            </div>
            <div class="tgc-profile-stats">
              <div class="tgc-stat">
                <span class="tgc-stat__label" id="lbl-tgc-stat-playtime"></span>
                <span class="tgc-stat__val" id="tgc-stat-playtime">0</span>
              </div>
              <div class="tgc-stat">
                <span class="tgc-stat__label" id="lbl-tgc-stat-totalscore"></span>
                <span class="tgc-stat__val" id="tgc-stat-totalscore">0</span>
              </div>
              <div class="tgc-stat">
                <span class="tgc-stat__label" id="lbl-tgc-stat-highscore"></span>
                <span class="tgc-stat__val" id="tgc-stat-highscore">0</span>
              </div>
              <div class="tgc-stat">
                <span class="tgc-stat__label" id="lbl-tgc-stat-deaths"></span>
                <span class="tgc-stat__val" id="tgc-stat-deaths">0</span>
              </div>
              <div class="tgc-stat">
                <span class="tgc-stat__label" id="lbl-tgc-stat-levels"></span>
                <span class="tgc-stat__val" id="tgc-stat-levels">0</span>
              </div>
            </div>
            <div class="tgc-profile-share">
              <button type="button" class="tgc-btn tgc-btn--secondary" id="tgc-profile-copy"></button>
              <button type="button" class="tgc-btn" id="tgc-profile-sync"></button>
              <button type="button" class="tgc-btn tgc-btn--danger" id="tgc-profile-logout"></button>
            </div>
            <h3 class="tgc-ach-heading" id="tgc-ach-heading"></h3>
            <div class="tgc-ach-grid" id="tgc-ach-grid"></div>
            <p id="tgc-profile-msg" class="tgc-msg"></p>
          </div>
          <div id="tgc-tab-leaderboard" class="tgc-tab-contents tgc-hidden">
            <p class="tgc-lb-live" id="tgc-lb-live">…</p>
            <div id="tgc-lb-table"></div>
            <p id="tgc-lb-status" class="tgc-msg"></p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
